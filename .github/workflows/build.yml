name: Build PocketBook ARMv6

on:
  workflow_dispatch:
  push:
    branches: [armv6-fix, master]

permissions:
  contents: write

jobs:
  build-pocketbook:
    runs-on: ubuntu-22.04

    steps:
      - name: Install deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq build-essential autoconf automake bison flex gawk \
            libtool libtool-bin libncurses-dev curl file git gperf help2man texinfo \
            unzip wget file xz-utils meson python3-pip ninja-build \
            gcc-arm-linux-gnueabi g++-arm-linux-gnueabi pkg-config-arm-linux-gnueabi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Setup cross-compiler symlinks for PocketBook
        run: |
          # Create symlinks so the build finds arm-pocketbook-linux-gnueabi-gcc
          sudo mkdir -p /usr/local/arm-pb/bin
          sudo ln -sf /usr/bin/arm-linux-gnueabi-gcc /usr/local/arm-pb/bin/arm-pocketbook-linux-gnueabi-gcc
          sudo ln -sf /usr/bin/arm-linux-gnueabi-g++ /usr/local/arm-pb/bin/arm-pocketbook-linux-gnueabi-g++
          sudo ln -sf /usr/bin/arm-linux-gnueabi-ar /usr/local/arm-pb/bin/arm-pocketbook-linux-gnueabi-ar
          sudo ln -sf /usr/bin/arm-linux-gnueabi-ld /usr/local/arm-pb/bin/arm-pocketbook-linux-gnueabi-ld
          sudo ln -sf /usr/bin/arm-linux-gnueabi-strip /usr/local/arm-pb/bin/arm-pocketbook-linux-gnueabi-strip
          # Verify
          PATH="/usr/local/arm-pb/bin:$PATH" arm-pocketbook-linux-gnueabi-gcc --version

      - name: Patch architecture flags (ARMv6 for Pro 902)
        run: |
          cd base
          # Replace ARMv7 NEON arch with ARMv6
          sed -i 's/ARMV7_A8_ARCH/ARMV6_1136_ARCH/' Makefile.defs
          grep -B2 -A2 'TARGET.*pocketbook' Makefile.defs
          cd ..

      - name: Fetch thirdparty
        run: |
          git config --global --add safe.directory "$PWD"
          make fetchthirdparty

      - name: Build base
        run: make TARGET=pocketbook base
        env:
          MAKEFLAGS: OUTPUT_DIR=build INSTALL_DIR=install PARALLEL_JOBS=2
          PATH: /usr/local/arm-pb/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin

      - name: Package update
        run: make TARGET=pocketbook update
        env:
          PATH: /usr/local/arm-pb/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin

      - name: List artifacts
        run: ls -la koreader-pocketbook-*.zip koreader-pocketbook-*.tar.xz 2>/dev/null || echo "No artifacts found"

      - name: Upload artifact (ZIP)
        uses: actions/upload-artifact@v4
        with:
          name: koreader-pocketbook-armv6-zip
          path: koreader-pocketbook-*.zip
          if-no-files-found: warn

      - name: Upload artifact (OTA)
        uses: actions/upload-artifact@v4
        with:
          name: koreader-pocketbook-armv6-ota
          path: koreader-pocketbook-*.tar.xz
          if-no-files-found: warn
