name: Build PocketBook ARMv6

on:
  workflow_dispatch:
  push:
    branches: [armv6-fix, master]

permissions:
  contents: write

jobs:
  build-pocketbook:
    runs-on: ubuntu-22.04

    steps:
      - name: Install deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq build-essential autoconf automake bison flex gawk \
            libtool libtool-bin libncurses-dev curl file git gperf help2man texinfo \
            unzip wget file xz-utils

      - name: Restore cached toolchain
        id: cache-tc
        uses: actions/cache@v4
        with:
          path: ~/x-tools
          key: pocketbook-toolchain-v3

      - name: Build PocketBook toolchain
        if: steps.cache-tc.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 https://github.com/NiLuJe/koxtoolchain.git /tmp/koxtoolchain
          cd /tmp/koxtoolchain
          ./gen-tc.sh pocketbook
          echo "=== Toolchain built ==="
          ls ~/x-tools/arm-pocketbook-linux-gnueabi/bin/
          ~/x-tools/arm-pocketbook-linux-gnueabi/bin/arm-pocketbook-linux-gnueabi-gcc --version

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Patch architecture flags (ARMv6 for Pro 902)
        run: |
          cd base
          sed -i 's/ARMV7_A8_ARCH/ARMV6_1136_ARCH/' Makefile.defs
          grep -B2 -A2 'TARGET.*pocketbook' Makefile.defs
          cd ..

      - name: Fetch thirdparty
        run: |
          git config --global --add safe.directory "$PWD"
          make fetchthirdparty

      - name: Build base
        run: |
          export PATH="$HOME/x-tools/arm-pocketbook-linux-gnueabi/bin:$PATH"
          make TARGET=pocketbook base
        env:
          MAKEFLAGS: OUTPUT_DIR=build INSTALL_DIR=install PARALLEL_JOBS=2

      - name: Package update
        run: |
          export PATH="$HOME/x-tools/arm-pocketbook-linux-gnueabi/bin:$PATH"
          make TARGET=pocketbook update

      - name: List artifacts
        run: ls -la koreader-pocketbook-*.zip koreader-pocketbook-*.tar.xz 2>/dev/null || echo "No artifacts found"

      - name: Upload artifact (ZIP)
        uses: actions/upload-artifact@v4
        with:
          name: koreader-pocketbook-armv6-zip
          path: koreader-pocketbook-*.zip
          if-no-files-found: warn

      - name: Upload artifact (OTA)
        uses: actions/upload-artifact@v4
        with:
          name: koreader-pocketbook-armv6-ota
          path: koreader-pocketbook-*.tar.xz
          if-no-files-found: warn
