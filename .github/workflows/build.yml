name: Build PocketBook ARMv6

on:
  workflow_dispatch:
  push:
    branches: [armv6-fix, master]

permissions:
  contents: write

jobs:
  build-pocketbook:
    runs-on: ubuntu-22.04

    steps:
      - name: Install deps
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update -qq
          sudo apt-get install -y -qq build-essential autoconf automake bison flex gawk \
            libtool libtool-bin libncurses-dev curl file git gperf help2man texinfo \
            unzip wget file xz-utils meson python3-pip ninja-build \
            gcc-arm-linux-gnueabi g++-arm-linux-gnueabi \
            libc6-dev-i386 gcc-multilib g++-multilib 2>&1 || \
          sudo apt-get install -y -qq \
            libc6-dev-i386 lib32gcc-s1 lib32stdc++6 lib32z1 libc6-i386 \
            gcc-arm-linux-gnueabi g++-arm-linux-gnueabi \
            meson ninja-build python3-pip linux-libc-dev:i386

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Setup cross-compiler symlinks for PocketBook
        run: |
          sudo mkdir -p /usr/local/arm-pb/bin
          # Find the actual ARM cross-compiler (versioned or unversioned)
          GCC_BIN=$(ls /usr/bin/arm-linux-gnueabi-gcc* 2>/dev/null | head -1)
          PREFIX="${GCC_BIN%/gcc*}"
          if [ -z "$GCC_BIN" ]; then
            echo "ARM cross-compiler not found!"
            ls /usr/bin/arm-linux-gnueabi-* 2>/dev/null || echo "No arm-linux-gnueabi-* tools found"
            exit 1
          fi
          for tool in gcc g++ cpp ar as ld nm objcopy objdump ranlib readelf strip; do
            src="${PREFIX}/bin/arm-linux-gnueabi-${tool}"
            [ -f "${src}" ] || src="/usr/bin/arm-linux-gnueabi-${tool}"
            [ -f "${src}" ] || src="/usr/bin/arm-linux-gnueabi-${tool}-*"
            actual=$(ls ${src} 2>/dev/null | head -1)
            if [ -n "$actual" ]; then
              sudo ln -sf "$actual" "/usr/local/arm-pb/bin/arm-pocketbook-linux-gnueabi-${tool}"
            else
              echo "WARNING: ${tool} not found"
            fi
          done
          PATH="/usr/local/arm-pb/bin:$PATH" arm-pocketbook-linux-gnueabi-gcc --version
          PATH="/usr/local/arm-pb/bin:$PATH" arm-pocketbook-linux-gnueabi-ranlib --version

      - name: Patch architecture flags (ARMv6 for Pro 902)
        run: |
          cd base
          sed -i 's/ARMV7_A8_ARCH/ARMV6_1136_ARCH/' Makefile.defs
          grep -B2 -A2 'TARGET.*pocketbook' Makefile.defs
          cd ..

      - name: Fetch thirdparty
        run: |
          git config --global --add safe.directory "$PWD"
          make fetchthirdparty

      - name: Build base
        run: make TARGET=pocketbook base
        env:
          MAKEFLAGS: OUTPUT_DIR=build INSTALL_DIR=install PARALLEL_JOBS=2
          PATH: /usr/local/arm-pb/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin

      - name: Package update
        run: make TARGET=pocketbook update
        env:
          PATH: /usr/local/arm-pb/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin

      - name: List artifacts
        run: ls -la koreader-pocketbook-*.zip koreader-pocketbook-*.tar.xz 2>/dev/null || echo "No artifacts found"

      - name: Upload artifact (ZIP)
        uses: actions/upload-artifact@v4
        with:
          name: koreader-pocketbook-armv6-zip
          path: koreader-pocketbook-*.zip
          if-no-files-found: warn

      - name: Upload artifact (OTA)
        uses: actions/upload-artifact@v4
        with:
          name: koreader-pocketbook-armv6-ota
          path: koreader-pocketbook-*.tar.xz
          if-no-files-found: warn
