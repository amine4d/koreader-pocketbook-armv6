name: Build PocketBook ARMv6

on:
  workflow_dispatch:
  push:
    branches: [armv6-fix, master]

permissions:
  contents: write

jobs:
  build-pocketbook:
    runs-on: ubuntu-22.04
    container:
      image: ghcr.io/koreader/koxtoolchain:pocketbook-2021.12
      options: --user root

    steps:
      - name: Install deps
        run: |
          apt-get update -qq
          apt-get install -y -qq git file xz-utils sudo

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Setup toolchain environment
        run: |
          # Source the koxtoolchain environment setup
          . /home/kox/koxtoolchain/refs/x-compile.sh pocketbook env
          # Verify compiler is available
          which arm-pocketbook-linux-gnueabi-gcc || echo "gcc not in PATH yet"
          arm-pocketbook-linux-gnueabi-gcc --version || echo "need to set PATH"

      - name: Patch architecture for ARMv6 (PocketBook Pro 902)
        run: |
          set -x
          cd base
          sed -i 's/ARMV7_A8_ARCH/ARMV6_1136_ARCH/' Makefile.defs
          grep -B2 -A2 'TARGET.*pocketbook' Makefile.defs || true
          cd ..

      - name: Fetch thirdparty
        run: |
          git config --global --add safe.directory "$PWD"
          make fetchthirdparty

      - name: Build base
        run: |
          # Source toolchain and build
          . /home/kox/koxtoolchain/refs/x-compile.sh pocketbook env
          make TARGET=pocketbook base
        env:
          MAKEFLAGS: OUTPUT_DIR=build INSTALL_DIR=install PARALLEL_JOBS=2

      - name: Package update
        run: |
          . /home/kox/koxtoolchain/refs/x-compile.sh pocketbook env
          make TARGET=pocketbook update

      - name: List artifacts
        run: ls -la koreader-pocketbook-*.zip koreader-pocketbook-*.tar.xz 2>/dev/null || echo "No artifacts found"

      - name: Upload artifact (ZIP)
        uses: actions/upload-artifact@v4
        with:
          name: koreader-pocketbook-armv6-zip
          path: koreader-pocketbook-*.zip
          if-no-files-found: warn

      - name: Upload artifact (OTA)
        uses: actions/upload-artifact@v4
        with:
          name: koreader-pocketbook-armv6-ota
          path: koreader-pocketbook-*.tar.xz
          if-no-files-found: warn
